<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Каталог | maxsav4</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Подключаем движок для размещения моделей на полу/столе -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body { background-color: #050505; color: #fff; font-family: 'Space Grotesk', sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #111; border: 1px solid #333; border-radius: 15px; padding: 20px; text-align: center; }
        .card img { max-width: 100%; border-radius: 10px; margin-bottom: 15px; height: 200px; object-fit: cover; }
        .btn { display: inline-block; background: #00ffcc; color: #000; padding: 10px 20px; text-decoration: none; border-radius: 20px; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; width: 100%; box-sizing: border-box;}
        
        /* Стили для 3D Вьювера */
        #viewer-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        model-viewer { width: 100%; height: 100%; }
        
        .close-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; padding: 10px 15px; border-radius: 10px; z-index: 10000; cursor: pointer; font-family: 'Space Grotesk'; font-weight: bold; }
        
        /* Кнопка запуска AR внутри модалки */
        .ar-start-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: #ff00ff; color: #fff; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; font-family: 'Space Grotesk'; font-size: 1.1rem; box-shadow: 0 0 20px rgba(255,0,255,0.5); }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #00ffcc; margin-bottom: 40px;">AR КАТАЛОГ</h1>
    <div class="grid" id="catalog-grid"></div>

    <!-- Модальное окно для 3D предпросмотра и AR -->
    <div id="viewer-modal">
        <button class="close-btn" onclick="closeViewer()">ЗАКРЫТЬ X</button>
        
        <!-- 
            ar-placement="floor" - заставляет модель искать пол/стол
            ar-scale="fixed" - запрещает телефону растягивать модель 
        -->
        <model-viewer 
            id="ar-model" 
            src="" 
            ar 
            ar-modes="webxr scene-viewer quick-look" 
            camera-controls 
            touch-action="pan-y" 
            ar-placement="floor"
            ar-scale="fixed"
            shadow-intensity="1">
            
            <button slot="ar-button" class="ar-start-btn">
                РАЗМЕСТИТЬ В КОМНАТЕ
            </button>
        </model-viewer>
    </div>

    <script>
        fetch('catalog.json')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('catalog-grid');
                
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    let mediaHtml = '';
                    if (item.image) {
                        mediaHtml = `<img src="${item.image}" alt="${item.title}">`;
                    } else {
                        mediaHtml = `<div style="height: 200px; background: #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px;">3D Модель</div>`;
                    }

                    // Если есть кастомная ссылка (сканер коробки)
                    let btnHtml = '';
                    if (item.customLink) {
                        btnHtml = `<a href="${item.customLink}" class="btn">${item.customLinkText}</a>`;
                    } 
                    // Если это обычная модель на стол
                    else if (item.model) {
                        const scale = item.scale || "1 1 1";
                        btnHtml = `<button class="btn" onclick="openViewer('${item.model}', '${scale}')">СМОТРЕТЬ 3D / AR</button>`;
                    }

                    card.innerHTML = `
                        ${mediaHtml}
                        <h2>${item.title}</h2>
                        <p style="color: #ff00ff; font-weight: bold;">${item.price}</p>
                        <p style="font-size: 0.9rem; color: #aaa;">${item.description || ''}</p>
                        ${btnHtml}
                    `;
                    grid.appendChild(card);
                });
            });

        function openViewer(modelSrc, scale) {
            const viewer = document.getElementById('ar-model');
            const modal = document.getElementById('viewer-modal');
            
            viewer.src = modelSrc;
            viewer.scale = scale; // Применяем уменьшение размера
            modal.style.display = 'block';
        }

        function closeViewer() {
            document.getElementById('viewer-modal').style.display = 'none';
            document.getElementById('ar-model').src = '';
        }
    </script>
</body>
</html>
