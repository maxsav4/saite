<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Case Tracker | maxsav4</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent !important; font-family: 'Space Grotesk', sans-serif; }
        
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 30px 20px; box-sizing: border-box; }
        
        .header { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        
        .back-btn { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0, 255, 204, 0.5); color: #00ffcc; padding: 12px 20px; border-radius: 30px; text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: bold; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .status-box { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); padding: 12px 20px; border-radius: 30px; color: #fff; font-size: 0.9rem; text-transform: uppercase; border: 1px solid rgba(255, 255, 255, 0.2); animation: pulse 2s infinite; box-shadow: 0 4px 15px rgba(0,0,0,0.5);}
        
        @keyframes pulse { 0% { border-color: rgba(0, 255, 204, 0.3); } 50% { border-color: rgba(0, 255, 204, 1); } 100% { border-color: rgba(0, 255, 204, 0.3); } }

        #example-scanning-overlay { display: none !important; }
        #error-message { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255, 0, 0, 0.8); color: white; padding: 20px; border-radius: 10px; display: none; z-index: 2000; text-align: center; }
    </style>

    <script>
        // Окклюзия (невидимая маска)
        AFRAME.registerComponent('occlusion-material', {
            init: function () {
                const mesh = this.el.getObject3D('mesh');
                if (mesh) { mesh.material.colorWrite = false; }
            }
        });

        window.addEventListener('load', () => {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                const err = document.getElementById('error-message');
                if (err) { err.style.display = 'block'; err.innerText = "Ваш браузер не поддерживает доступ к камере."; }
            }
        });
    </script>
</head>
<body>

    <div id="error-message"></div>

    <div class="ui-overlay">
        <div class="header">
            <a href="index.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                В КАТАЛОГ
            </a>
            <div class="status-box" id="status-text">ПОИСК ЦЕЛИ...</div>
        </div>
    </div>

    <!-- Фильтры сглаживания -->
    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiScanning: no; filterMinCF: 0.001; filterBeta: 0.01;" 
        color-space="sRGB" 
        renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="case-model" src="terea.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-box" mindar-image-target="targetIndex: 0">
            
            <!-- Обертка с зафиксированными настройками (Масштаб: 0.012, Позиция: X -0.066, Y 0.06) -->
            <a-entity id="adjustable-wrapper" position="-0.066 0.06 0" scale="0.012 0.012 0.012">
                
                <!-- 1. НЕВИДИМАЯ ДЫРКА (Окклюзия). -->
                <a-box position="0 0 0" scale="1 1.545 0.309" occlusion-material></a-box>

                <!-- 2. ТВОЯ 3D МОДЕЛЬ ЧЕХЛА -->
                <!-- ИСПРАВЛЕН ПОВОРОТ: 270 перенесено на ось X. (X: 270, Y: -90, Z: 0) -->
                <a-gltf-model 
                    src="#case-model" 
                    position="0 0 0" 
                    scale="1 1 1"
                    rotation="270 -90 0">
                </a-gltf-model>

            </a-entity>

        </a-entity>
    </a-scene>

    <script>
        const target = document.querySelector('#target-box');
        const statusText = document.querySelector('#status-text');

        if (target) {
            target.addEventListener("targetFound", () => {
                statusText.innerText = "ЗАХВАТ УСПЕШЕН!";
                statusText.style.background = "rgba(0, 255, 150, 0.8)";
                statusText.style.borderColor = "#00ff96";
                statusText.style.color = "#000";
            });

            target.addEventListener("targetLost", () => {
                statusText.innerText = "ПОИСК ЦЕЛИ...";
                statusText.style.background = "rgba(0, 0, 0, 0.7)";
                statusText.style.borderColor = "rgba(255, 255, 255, 0.2)";
                statusText.style.color = "#fff";
            });
        }

        // Автофокус при тапе
        document.body.addEventListener('click', async (e) => {
            // Игнорируем клики по ссылкам навигации
            if(e.target.closest('a')) return;
            
            try {
                const video = document.querySelector('video');
                if (video && video.srcObject) {
                    const track = video.srcObject.getVideoTracks()[0];
                    if (track && typeof track.applyConstraints === 'function') {
                        await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
                    }
                }
            } catch (err) {
                console.log("Автофокус не сработал");
            }
        });
    </script>
</body>
</html>
