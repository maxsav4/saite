<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Каталог | maxsav4</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Подключаем движок для 3D предпросмотра -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body { background-color: #050505; color: #fff; font-family: 'Space Grotesk', sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #111; border: 1px solid #333; border-radius: 15px; padding: 20px; text-align: center; display: flex; flex-direction: column; }
        
        /* Стили для 3D предпросмотра внутри карточки */
        model-viewer { 
            width: 100%; 
            height: 250px; 
            background-color: #222; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            outline: none; 
        }
        
        .card img { max-width: 100%; border-radius: 10px; margin-bottom: 15px; height: 250px; object-fit: cover; }
        .btn { display: inline-block; background: #00ffcc; color: #000; padding: 12px 20px; text-decoration: none; border-radius: 20px; font-weight: bold; cursor: pointer; border: none; margin-top: auto; width: 100%; box-sizing: border-box; transition: 0.3s; }
        .btn:hover { background: #00cca3; transform: scale(1.02); }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #00ffcc; margin-bottom: 40px;">AR КАТАЛОГ</h1>
    <div class="grid" id="catalog-grid"></div>

    <script>
        // ЗАГРУЗКА КАТАЛОГА
        fetch('catalog.json')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('catalog-grid');
                
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    let mediaHtml = '';
                    
                    // Если есть 3D модель - выводим плеер
                    if (item.model) {
                        const scaleAttr = item.scale ? `scale="${item.scale}"` : '';
                        
                        // Добавлен interaction-prompt="none" для скрытия анимации пальца
                        // Изменен ar-scale на "fixed" для точного соблюдения масштаба
                        mediaHtml = `
                            <model-viewer 
                                src="${item.model}" 
                                ar 
                                ar-modes="webxr scene-viewer quick-look" 
                                camera-controls 
                                auto-rotate 
                                auto-rotate-delay="2000"
                                camera-orbit="45deg 60deg auto"
                                shadow-intensity="1"
                                ar-placement="floor"
                                ar-scale="fixed"
                                interaction-prompt="none"
                                ${scaleAttr}>
                            </model-viewer>
                        `;
                    } 
                    // Если модели нет, но есть фото
                    else if (item.image) {
                        mediaHtml = `<img src="${item.image}" alt="${item.title}">`;
                    }

                    // Отдельная кнопка сканера для чехла
                    let btnHtml = '';
                    if (item.customLink) {
                        btnHtml = `<a href="${item.customLink}" class="btn" style="background: #ff00ff; color: white;">${item.customLinkText}</a>`;
                    }

                    card.innerHTML = `
                        ${mediaHtml}
                        <h2 style="margin: 10px 0;">${item.title}</h2>
                        <p style="color: #ff00ff; font-weight: bold; margin-bottom: 10px;">${item.price}</p>
                        <p style="font-size: 0.9rem; color: #aaa; margin-bottom: 15px;">${item.description || ''}</p>
                        ${btnHtml}
                    `;
                    grid.appendChild(card);
                });
            });

        // ==========================================
        // ЛОГИКА ГИРОСКОПА ДЛЯ ПРЕДПРОСМОТРА
        // ==========================================
        let lastGamma = null;
        let lastBeta = null;
        let isTouching = false;
        let gyroTimeout = null;

        // Отключаем гироскоп, пока пользователь крутит модель пальцем
        window.addEventListener('touchstart', () => isTouching = true);
        window.addEventListener('touchend', () => isTouching = false);

        window.addEventListener('deviceorientation', (e) => {
            // Если трогаем пальцем или данных нет - выходим
            if (isTouching || e.gamma === null || e.beta === null) return;

            if (lastGamma === null) {
                lastGamma = e.gamma;
                lastBeta = e.beta;
                return;
            }

            // Вычисляем, насколько наклонили телефон
            const deltaGamma = e.gamma - lastGamma;
            const deltaBeta = e.beta - lastBeta;

            // Порог чувствительности (если телефон шевелится, а не лежит)
            if (Math.abs(deltaGamma) > 0.3 || Math.abs(deltaBeta) > 0.3) {
                
                // Сбрасываем таймер при каждом движении
                if (gyroTimeout) {
                    clearTimeout(gyroTimeout);
                }

                const viewers = document.querySelectorAll('model-viewer');
                
                viewers.forEach(viewer => {
                    if (!viewer.getCameraOrbit) return;
                    
                    // Отключаем автопрокрутку, пока крутим гироскопом
                    viewer.removeAttribute('auto-rotate');
                    
                    const currentOrbit = viewer.getCameraOrbit();
                    
                    // Переводим радианы в градусы и добавляем наклон гироскопа
                    let newTheta = (currentOrbit.theta * 180 / Math.PI) + (deltaGamma * 1.5);
                    let newPhi = (currentOrbit.phi * 180 / Math.PI) + (deltaBeta * 1.5);

                    // Ограничиваем вертикальный угол
                    newPhi = Math.max(10, Math.min(170, newPhi));

                    // Применяем новые координаты камеры
                    viewer.cameraOrbit = `${newTheta}deg ${newPhi}deg auto`;
                });

                // Устанавливаем таймер на 3 секунды бездействия
                gyroTimeout = setTimeout(() => {
                    viewers.forEach(viewer => {
                        // Плавно выравниваем вид в исходное красивое положение
                        viewer.cameraOrbit = "45deg 60deg auto";
                        // Возвращаем автоматическое вращение
                        viewer.setAttribute('auto-rotate', '');
                    });
                }, 3000);
            }

            // Запоминаем текущее положение для следующего кадра
            lastGamma = e.gamma;
            lastBeta = e.beta;
        });

        // Запрос разрешения для гироскопа на iPhone (iOS 13+)
        // Срабатывает один раз при первом тапе по экрану
        document.body.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    await DeviceOrientationEvent.requestPermission();
                } catch (err) {
                    console.log("Доступ к гироскопу отклонен");
                }
            }
        }, { once: true });
    </script>
</body>
</html>
