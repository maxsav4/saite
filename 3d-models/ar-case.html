<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Case Tracker | maxsav4</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <!-- Подключаем A-Frame и MindAR для распознавания картинок -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Space Grotesk', sans-serif; }
        
        /* Интерфейс поверх камеры */
        .ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; padding: 30px 20px; box-sizing: border-box;
        }

        .header { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        
        .back-btn {
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(0, 255, 204, 0.4);
            color: #00ffcc; padding: 10px 20px; border-radius: 30px; text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: bold; text-transform: uppercase;
        }
        
        .status-box {
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 30px;
            color: #fff; font-size: 0.9rem; text-transform: uppercase; border: 1px solid rgba(255, 255, 255, 0.2);
            animation: pulse 2s infinite;
        }

        /* Прицел сканера */
        .scanner-frame {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 150px; border: 2px dashed rgba(0, 255, 204, 0.5); border-radius: 10px;
        }
        .scanner-frame::after { content: 'НАВЕДИТЕ НА КОРОБКУ TEREA'; position: absolute; bottom: -30px; left: 0; width: 100%; text-align: center; color: rgba(0, 255, 204, 0.8); font-size: 0.8rem; letter-spacing: 1px; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(0, 255, 204, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); } }

        /* Кастомный экран загрузки MindAR */
        #example-scanning-overlay { display: none !important; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <div class="header">
            <a href="index.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                В КАТАЛОГ
            </a>
            <div class="status-box">Сканирование...</div>
        </div>
        <div class="scanner-frame"></div>
    </div>

    <!-- 
        СЦЕНА AR. 
        В imageTargetSrc нужно указать ваш сгенерированный файл targets.mind 
    -->
    <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <!-- Сюда в будущем впишешь ссылку на свой .glb файл чехла: -->
            <!-- <a-asset-item id="caseModel" src="your_case_model.glb"></a-asset-item> -->
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Сущность, которая привязывается к картинке (targetIndex: 0 значит первая картинка в файле mind) -->
        <a-entity mindar-image-target="targetIndex: 0">
            
            <!-- 
                ВРЕМЕННАЯ ЗАГЛУШКА: Голографический короб. 
                Он появится ровно поверх вашей коробки TEREA.
            -->
            <a-box position="0 0 0.05" width="1" height="0.65" depth="0.2" color="#00ffcc" material="opacity: 0.5; transparent: true; wireframe: false"></a-box>
            <a-box position="0 0 0.05" width="1" height="0.65" depth="0.2" color="#ffffff" material="wireframe: true"></a-box>

            <!-- 
                КОГДА ЗАГРУЗИШЬ СВОЙ 3D ЧЕХОЛ, раскомментируй строку ниже и удали заглушки <a-box> выше.
                <a-gltf-model src="#caseModel" position="0 0 0" scale="1 1 1" rotation="0 0 0"></a-gltf-model>
            -->

        </a-entity>
    </a-scene>

</body>
</html>
