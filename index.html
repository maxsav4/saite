<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Models | maxsav4</title>
    <style>
        /* === БАЗОВЫЕ СТИЛИ И ФОН === */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #030305;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 200, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 200, 0.05), transparent 25%);
        }

        /* === ШАПКА === */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 5%;
            background: rgba(3, 3, 5, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .back-btn {
            color: #888;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 20px;
        }
        .back-btn:hover { color: #fff; background: rgba(255, 255, 255, 0.1); transform: translateX(-5px); }
        
        .header h1 {
            font-size: 1.5rem;
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
            font-weight: 800;
        }

        /* === КАТАЛОГ СЕТКА PINTEREST STYLE (MASONRY) === */
        .catalog-container {
            padding: 40px 5%;
            max-width: 1400px;
            margin: 0 auto;
            /* Настройки Pinterest-колонок */
            column-count: 4;
            column-gap: 25px;
        }

        /* Адаптивность колонок */
        @media (max-width: 1200px) { .catalog-container { column-count: 3; } }
        @media (max-width: 900px) { .catalog-container { column-count: 2; } }
        @media (max-width: 500px) { .catalog-container { column-count: 1; } }

        /* === КАРТОЧКА ТОВАРА === */
        .product-card {
            break-inside: avoid; /* Чтобы карточка не разрывалась между колонками */
            margin-bottom: 25px;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #111;
            cursor: pointer;
            transform: translateZ(0); /* Аппаратное ускорение */
        }
        
        .product-image {
            width: 100%;
            display: block;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        /* Статус (в наличии / под заказ) */
        .status-badge {
            position: absolute;
            top: 15px; left: 15px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 2;
        }
        .status-available { background: rgba(0, 255, 100, 0.15); color: #00ff64; border: 1px solid rgba(0, 255, 100, 0.3); }
        .status-order { background: rgba(255, 170, 0, 0.15); color: #ffaa00; border: 1px solid rgba(255, 170, 0, 0.3); }

        /* === ИНФОРМАЦИОННАЯ ПАНЕЛЬ (ПОЯВЛЯЕТСЯ ПРИ НАВЕДЕНИИ) === */
        .product-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 60%, transparent 100%);
            padding: 40px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0; /* Скрыто по умолчанию на ПК */
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 2;
        }
        
        .product-card:hover .product-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .product-title {
            font-size: 1.2rem;
            margin: 0;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }
        .product-price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }

        /* Кнопка "Заказать в TG" */
        .btn-order {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-order:hover {
            background: #fff;
            color: #000;
        }

        /* Индикатор загрузки */
        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
            font-size: 1.2rem;
            column-span: all;
        }

        /* Для мобильных устройств делаем панель всегда слегка видимой */
        @media (max-width: 900px) {
            .product-overlay {
                opacity: 1;
                transform: translateY(0);
                background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 70%, transparent 100%);
                padding-top: 50px;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="../index.html" class="back-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            BACK
        </a>
        <h1>3D MODELS</h1>
        <div style="width: 80px;"></div>
    </header>

    <main class="catalog-container" id="catalog">
        <div class="loading">Загрузка проектов...</div>
    </main>

    <script>
        const catalogContainer = document.getElementById('catalog');
        const telegramUsername = 'maxsav4';

        async function loadCatalog() {
            let products = [];
            
            try {
                // Пытаемся загрузить реальный файл (сработает на GitHub Pages)
                const response = await fetch('catalog.json');
                if (!response.ok) throw new Error('Файл не найден');
                products = await response.json();
            } catch (error) {
                console.warn("Используем демо-данные для предпросмотра:", error);
                // Фолбэк-данные, если скрипт запущен локально без сервера или в предпросмотре
                products = [
                    {
                        "id": "bear-01",
                        "title": "Cyber Bear (Low Poly)",
                        "price": "500 ₴",
                        "status": "available",
                        "image": "https://images.unsplash.com/photo-1615554869502-d7b0f69a19c7?auto=format&fit=crop&q=80&w=600&h=800"
                    },
                    {
                        "id": "skull-02",
                        "title": "Anatomy Skull Stand",
                        "price": "750 ₴",
                        "status": "order",
                        "image": "https://images.unsplash.com/photo-1594953934789-fce2a3f7ffec?auto=format&fit=crop&q=80&w=600&h=400"
                    },
                    {
                        "id": "lamp-03",
                        "title": "Neon Grid Lamp",
                        "price": "1200 ₴",
                        "status": "available",
                        "image": "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=600&h=900"
                    },
                    {
                        "id": "mech-04",
                        "title": "Mecha Parts Kit",
                        "price": "от 300 ₴",
                        "status": "order",
                        "image": "https://images.unsplash.com/photo-1537151377170-9c19a791bbea?auto=format&fit=crop&q=80&w=600&h=600"
                    },
                    {
                        "id": "controller-05",
                        "title": "Custom ESP Case",
                        "price": "400 ₴",
                        "status": "available",
                        "image": "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=600&h=500"
                    }
                ];
            }
            
            catalogContainer.innerHTML = ''; 

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';

                const isAvailable = product.status === 'available';
                const statusClass = isAvailable ? 'status-available' : 'status-order';
                const statusText = isAvailable ? 'В НАЛИЧИИ' : 'ПОД ЗАКАЗ';

                const message = `Привет! 👋\nХочу заказать:\n\n📦 Товар: ${product.title}\n🆔 ID: ${product.id}\n💰 Цена: ${product.price}\n\nПодскажи детали?`;
                const tgLink = `https://t.me/${telegramUsername}?text=${encodeURIComponent(message)}`;

                const imgSrc = product.image ? product.image : 'https://images.unsplash.com/photo-1615554869502-d7b0f69a19c7?auto=format&fit=crop&q=80&w=600';

                card.innerHTML = `
                    <span class="status-badge ${statusClass}">${statusText}</span>
                    <img src="${imgSrc}" alt="${product.title}" class="product-image" loading="lazy">
                    
                    <div class="product-overlay">
                        <h3 class="product-title">${product.title}</h3>
                        <div class="price-row">
                            <span class="product-price">${product.price}</span>
                            <a href="${tgLink}" target="_blank" class="btn-order">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                                ЗАКАЗАТЬ
                            </a>
                        </div>
                    </div>
                `;
                catalogContainer.appendChild(card);
            });
        }

        loadCatalog();
    </script>
</body>
</html>
