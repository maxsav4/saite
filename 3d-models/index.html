<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Каталог | maxsav4</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Подключаем движок для 3D предпросмотра -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body { background-color: #050505; color: #fff; font-family: 'Space Grotesk', sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #111; border: 1px solid #333; border-radius: 15px; padding: 20px; text-align: center; display: flex; flex-direction: column; }
        
        /* Стили для 3D предпросмотра внутри карточки */
        model-viewer { width: 100%; height: 250px; background-color: #222; border-radius: 10px; margin-bottom: 15px; outline: none; }
        
        .card img { max-width: 100%; border-radius: 10px; margin-bottom: 15px; height: 250px; object-fit: cover; }
        .btn { display: inline-block; background: #00ffcc; color: #000; padding: 12px 20px; text-decoration: none; border-radius: 20px; font-weight: bold; cursor: pointer; border: none; margin-top: auto; width: 100%; box-sizing: border-box; transition: 0.3s; }
        .btn:hover { background: #00cca3; transform: scale(1.02); }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #00ffcc; margin-bottom: 40px;">AR КАТАЛОГ</h1>
    <div class="grid" id="catalog-grid"></div>

    <script>
        fetch('catalog.json')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('catalog-grid');
                
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    let mediaHtml = '';
                    
                    // ГЕНЕРАЦИЯ 3D-ОКНА С ПРАВИЛЬНЫМ AR И ГИРОСКОПОМ
                    if (item.model) {
                        const scaleAttr = item.scale ? `scale="${item.scale}"` : '';
                        mediaHtml = `
                            <model-viewer 
                                src="${item.model}" 
                                ar 
                                ar-modes="webxr scene-viewer quick-look" 
                                camera-controls 
                                auto-rotate 
                                camera-orbit="45deg 60deg auto" 
                                shadow-intensity="1"
                                ar-placement="floor"
                                ar-scale="auto"
                                ${scaleAttr}>
                            </model-viewer>
                        `;
                    } 
                    // Если модели нет, но есть фото
                    else if (item.image) {
                        mediaHtml = `<img src="${item.image}" alt="${item.title}">`;
                    }

                    // Отдельная кнопка сканера для чехла
                    let btnHtml = '';
                    if (item.customLink) {
                        btnHtml = `<a href="${item.customLink}" class="btn">${item.customLinkText}</a>`;
                    }

                    card.innerHTML = `
                        ${mediaHtml}
                        <h2 style="margin: 10px 0;">${item.title}</h2>
                        <p style="color: #ff00ff; font-weight: bold; margin-bottom: 10px;">${item.price}</p>
                        <p style="font-size: 0.9rem; color: #aaa; margin-bottom: 15px;">${item.description || ''}</p>
                        ${btnHtml}
                    `;
                    grid.appendChild(card);
                });
            });
    </script>
</body>
</html>
