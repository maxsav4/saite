<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Case Tracker | maxsav4</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent !important; font-family: 'Space Grotesk', sans-serif; }
        
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 30px 20px; box-sizing: border-box; }
        
        .header { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        
        .back-btn { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0, 255, 204, 0.5); color: #00ffcc; padding: 12px 20px; border-radius: 30px; text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: bold; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .status-box { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); padding: 12px 20px; border-radius: 30px; color: #fff; font-size: 0.9rem; text-transform: uppercase; border: 1px solid rgba(255, 255, 255, 0.2); animation: pulse 2s infinite; box-shadow: 0 4px 15px rgba(0,0,0,0.5);}
        
        @keyframes pulse { 0% { border-color: rgba(0, 255, 204, 0.3); } 50% { border-color: rgba(0, 255, 204, 1); } 100% { border-color: rgba(0, 255, 204, 0.3); } }
        
        /* ВРЕМЕННАЯ ПАНЕЛЬ КАЛИБРОВКИ */
        .calibration-ui {
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); border: 1px solid #ff00ff;
            padding: 15px 20px; border-radius: 20px; pointer-events: auto; color: white; display: flex; flex-direction: column; gap: 8px;
            box-shadow: 0 4px 20px rgba(255, 0, 255, 0.3); margin-bottom: 20px;
        }
        .calibration-ui h3 { margin: 0 0 5px 0; font-size: 1rem; color: #ff00ff; text-transform: uppercase; }
        .calibration-ui p { margin: 0; font-size: 0.75rem; color: #aaa; }
        .calibration-ui .val-display { color: #00ffcc; font-size: 0.9rem; font-family: monospace; }
        .calibration-ui input[type=range] { width: 100%; accent-color: #ff00ff; margin-top: 5px; }

        #example-scanning-overlay { display: none !important; }
        #error-message { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255, 0, 0, 0.8); color: white; padding: 20px; border-radius: 10px; display: none; z-index: 2000; text-align: center; }
    </style>

    <script>
        // Окклюзия (невидимая маска)
        AFRAME.registerComponent('occlusion-material', {
            init: function () {
                const mesh = this.el.getObject3D('mesh');
                if (mesh) { mesh.material.colorWrite = false; }
            }
        });

        window.addEventListener('load', () => {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                const err = document.getElementById('error-message');
                if (err) { err.style.display = 'block'; err.innerText = "Ваш браузер не поддерживает доступ к камере."; }
            }
        });
    </script>
</head>
<body>

    <div id="error-message"></div>

    <div class="ui-overlay">
        <div class="header">
            <a href="index.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                В КАТАЛОГ
            </a>
            <div class="status-box" id="status-text">ПОИСК ЦЕЛИ...</div>
        </div>

        <!-- ПАНЕЛЬ КАЛИБРОВКИ (Временно для подгонки) -->
        <div class="calibration-ui" id="calib-ui" style="opacity: 0.5; transition: 0.3s;">
            <h3>Режим калибровки</h3>
            <p>1. Свайпай по экрану, чтобы двигать модель (X / Y).</p>
            <div class="val-display" id="pos-val">Pos: X: -0.050, Y: 0.000</div>
            
            <p style="margin-top: 10px;">2. Ползунок масштаба (Размер):</p>
            <div class="val-display" id="scale-val">Scale: 0.150</div>
            <!-- Диапазон изменен под новые значения -->
            <input type="range" id="scale-slider" min="0.05" max="0.5" step="0.005" value="0.15">
        </div>
    </div>

    <!-- 
        Изменил фильтры для более отзывчивого трекинга (filterMinCF: 0.001; filterBeta: 0.01)
    -->
    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiScanning: no; filterMinCF: 0.001; filterBeta: 0.01;" 
        color-space="sRGB" 
        renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="case-model" src="terea.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-box" mindar-image-target="targetIndex: 0">
            
            <!-- Обертка калибровки: базовый масштаб установлен на 0.15 -->
            <a-entity id="adjustable-wrapper" position="-0.05 0 0" scale="0.15 0.15 0.15">
                
                <!-- 1. НЕВИДИМАЯ ДЫРКА (Окклюзия). Внутренние пропорции коробки -->
                <a-box position="0 0 0" scale="1 1.545 0.309" occlusion-material></a-box>

                <!-- 2. ТВОЯ 3D МОДЕЛЬ ЧЕХЛА -->
                <!-- ВСЕ ПОВОРОТЫ ОБНУЛЕНЫ (rotation="0 0 0") -->
                <a-gltf-model 
                    src="#case-model" 
                    position="0 0 0" 
                    scale="1 1 1"
                    rotation="0 0 0">
                </a-gltf-model>

            </a-entity>

        </a-entity>
    </a-scene>

    <script>
        const target = document.querySelector('#target-box');
        const statusText = document.querySelector('#status-text');

        if (target) {
            target.addEventListener("targetFound", () => {
                statusText.innerText = "ЗАХВАТ УСПЕШЕН!";
                statusText.style.background = "rgba(0, 255, 150, 0.8)";
                statusText.style.borderColor = "#00ff96";
                statusText.style.color = "#000";
                document.getElementById('calib-ui').style.opacity = '1';
            });

            target.addEventListener("targetLost", () => {
                statusText.innerText = "ПОИСК ЦЕЛИ...";
                statusText.style.background = "rgba(0, 0, 0, 0.7)";
                statusText.style.borderColor = "rgba(255, 255, 255, 0.2)";
                statusText.style.color = "#fff";
                document.getElementById('calib-ui').style.opacity = '0.5';
            });
        }

        // ==========================================
        // ЛОГИКА КАЛИБРОВКИ (МАСШТАБ И СВАЙП)
        // ==========================================
        const wrapper = document.querySelector('#adjustable-wrapper');
        const scaleSlider = document.querySelector('#scale-slider');
        const scaleValDisplay = document.querySelector('#scale-val');
        const posValDisplay = document.querySelector('#pos-val');

        // Обработка ползунка масштаба
        scaleSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            wrapper.setAttribute('scale', `${val} ${val} ${val}`);
            scaleValDisplay.innerText = `Scale: ${val.toFixed(3)}`;
        });

        // Обработка свайпа для перемещения
        let isDragging = false;
        let dragDistance = 0; 
        let previousTouch = { x: 0, y: 0 };

        document.body.addEventListener('touchstart', (e) => {
            if(e.target.tagName.toLowerCase() === 'input' || e.target.closest('a') || e.target.closest('.calibration-ui')) return;
            
            isDragging = true;
            dragDistance = 0;
            previousTouch.x = e.touches[0].clientX;
            previousTouch.y = e.touches[0].clientY;
        }, {passive: false});

        document.body.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            
            const touch = e.touches[0];
            const deltaX = touch.clientX - previousTouch.x;
            const deltaY = touch.clientY - previousTouch.y;
            
            dragDistance += Math.abs(deltaX) + Math.abs(deltaY);

            // Чувствительность перемещения
            const sensitivity = 0.001; 
            const currentPos = wrapper.getAttribute('position');

            const newX = currentPos.x + (deltaX * sensitivity);
            const newY = currentPos.y - (deltaY * sensitivity); 

            wrapper.setAttribute('position', { x: newX, y: newY, z: currentPos.z });
            posValDisplay.innerText = `Pos: X: ${newX.toFixed(3)}, Y: ${newY.toFixed(3)}`;

            previousTouch.x = touch.clientX;
            previousTouch.y = touch.clientY;
        }, {passive: false});

        document.body.addEventListener('touchend', async (e) => {
            isDragging = false;
            
            // Автофокус при легком тапе (дистанция свайпа меньше 15 пикселей)
            if (dragDistance < 15) {
                try {
                    const video = document.querySelector('video');
                    if (video && video.srcObject) {
                        const track = video.srcObject.getVideoTracks()[0];
                        if (track && typeof track.applyConstraints === 'function') {
                            await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
                        }
                    }
                } catch (err) {
                    console.log("Автофокус не сработал");
                }
            }
        });
    </script>
</body>
</html>
