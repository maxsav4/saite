<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Каталог | maxsav4</title>
    
    <!-- SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { background-color: #050505; color: #fff; font-family: 'Space Grotesk', sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #111; border: 1px solid #333; border-radius: 15px; padding: 20px; text-align: center; display: flex; flex-direction: column; }
        model-viewer { width: 100%; height: 250px; background-color: transparent; border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; margin-bottom: 15px; outline: none; }
        .card-buttons { display: flex; gap: 10px; margin-top: auto; }
        .btn { flex: 1; padding: 12px 10px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; font-size: 0.85rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk'; }
        .btn-order { background: transparent; border: 1px solid #ff00ff; color: #ff00ff; }
        .btn-view { background: #00ffcc; color: #000; }
        .btn:hover { transform: scale(1.03); }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #00ffcc; margin-bottom: 40px;">AR КАТАЛОГ</h1>
    <div class="grid" id="catalog-grid"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        fetch('catalog.json')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('catalog-grid');
                data.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const mvId = `mv-${index}`;
                    
                    card.innerHTML = `
                        <model-viewer id="${mvId}" src="${item.model}" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate shadow-intensity="1" ar-placement="floor" ar-scale="auto" interaction-prompt="none" autoplay></model-viewer>
                        <h2 style="margin: 10px 0;">${item.title}</h2>
                        <p style="color: #ff00ff; font-weight: bold; margin-bottom: 15px;">${item.price}</p>
                        <div class="card-buttons">
                            <button class="btn btn-order" onclick="orderItem('${item.title}', '${item.price}')">ЗАКАЗАТЬ</button>
                            <button class="btn btn-view" onclick="document.getElementById('${mvId}').activateAR()">В AR</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });

        function orderItem(title, price) {
            // Отправляем данные боту. Это закроет Mini App и вызовет событие в Cloudflare
            tg.sendData(JSON.stringify({
                action: 'order',
                item: title,
                price: price
            }));
        }

        // Гироскоп с твоими настройками (инверсия +80% силы)
        let lastGamma = null, lastBeta = null;
        window.addEventListener('deviceorientation', (e) => {
            if (e.gamma === null || e.beta === null) return;
            if (lastGamma === null) { lastGamma = e.gamma; lastBeta = e.beta; return; }
            const deltaGamma = e.gamma - lastGamma;
            const deltaBeta = e.beta - lastBeta;
            if (Math.abs(deltaGamma) > 0.3 || Math.abs(deltaBeta) > 0.3) {
                document.querySelectorAll('model-viewer').forEach(viewer => {
                    const orbit = viewer.getCameraOrbit();
                    let newTheta = (orbit.theta * 180 / Math.PI) - (deltaGamma * 2.7);
                    let newPhi = (orbit.phi * 180 / Math.PI) - (deltaBeta * 2.7);
                    viewer.cameraOrbit = `${newTheta}deg ${Math.max(10, Math.min(170, newPhi))}deg auto`;
                });
            }
            lastGamma = e.gamma; lastBeta = e.beta;
        });
    </script>
</body>
</html>
